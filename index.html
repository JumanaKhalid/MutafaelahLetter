<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رسالة من قلب الجدة متفائلة - النسخة النهائية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cairo:wght@400;700&family=Aref+Ruqaa:wght@400;700&family=Lalezar&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-mint: #b9d8d3; 
            --accent-pink: #e58e8e; 
            --wax-seal: #d68080; 
            --paper-color: rgba(255, 255, 255, 0.98);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-mint);
            margin: 0;
            overflow-x: hidden;
            color: #3e2723;
            /* لضمان ظهور الألوان في المتصفحات المختلفة عند الطباعة */
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        /* واجهة الغلاف */
        #cover-page {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-mint);
            transition: transform 1.2s cubic-bezier(0.7, 0, 0.3, 1);
            position: relative;
            z-index: 50;
        }

        .cover-content {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 50px;
            text-align: center;
            border: 6px solid white;
            outline: 2px solid var(--accent-pink);
            box-shadow: 0 25px 50px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            max-width: 600px;
            width: 90%;
        }

        .grandma-img {
            width: 220px;
            height: 220px;
            object-fit: cover;
            border-radius: 50%;
            margin: 0 auto 20px;
            border: 5px solid var(--accent-pink);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* صفحة الرسالة */
        #message-page {
            min-height: 100vh;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 30px;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .vintage-card {
            max-width: 800px;
            width: 100%;
            background-color: var(--paper-color);
            padding: 50px;
            border: 8px solid white;
            outline: 2px solid var(--accent-pink);
            box-shadow: 0 15px 45px rgba(0,0,0,0.1);
            position: relative;
            border-radius: 60px;
        }

        .wax-seal {
            position: absolute;
            bottom: 35px;
            left: 35px;
            width: 110px;
            height: 110px;
            background: var(--wax-seal) !important; /* تثبيت اللون للطباعة */
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 4px 4px 12px rgba(0,0,0,0.25), inset -3px -3px 8px rgba(0,0,0,0.3);
            transform: rotate(-12deg);
            opacity: 0;
            transition: opacity 1.2s ease;
            z-index: 20;
            -webkit-print-color-adjust: exact;
        }

        .wax-seal::after {
            content: "الجدة\Aمتفائلة";
            white-space: pre-wrap;
            text-align: center;
            font-family: 'Lalezar', cursive;
            color: rgba(255, 255, 255, 0.95) !important;
            font-size: 1rem;
            line-height: 1.1;
            letter-spacing: 1px;
        }

        .date-time {
            font-size: 1rem;
            color: #777;
            margin-bottom: 25px;
            font-family: 'Cairo', sans-serif;
            font-weight: 600;
        }

        .title-box {
            background-color: var(--accent-pink) !important;
            color: white !important;
            padding: 15px 45px;
            border-radius: 60px;
            display: inline-block;
            margin-bottom: 35px;
            border: 4px solid white;
            font-family: 'Aref Ruqaa', serif;
            box-shadow: 0 5px 15px rgba(229, 142, 142, 0.4);
            -webkit-print-color-adjust: exact;
        }

        .typewriter-text {
            font-family: 'Amiri', serif;
            font-size: 2rem;
            line-height: 1.9;
            min-height: 140px;
            color: #2c1e1a;
            font-weight: 400;
        }

        .strike-through {
            text-decoration: line-through;
            color: #ccc;
            font-weight: normal;
        }

        .replacement-word {
            color: var(--accent-pink) !important;
            font-weight: 700;
            display: inline-block;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            -webkit-print-color-adjust: exact;
        }

        .replacement-word.visible {
            opacity: 1;
            transform: scale(1.1);
        }

        .btn-action {
            background: linear-gradient(to bottom, #ffffff, #f7f7f7);
            color: #333;
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            padding: 14px 50px;
            border-radius: 40px;
            border: 1px solid #ddd;
            box-shadow: 0 5px 0 #ccc;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1.1rem;
        }

        .btn-action:hover {
            background: white;
            transform: translateY(-2px);
            box-shadow: 0 7px 0 #ccc;
        }

        .btn-action:active {
            box-shadow: 0 2px 0 #ccc;
            transform: translateY(3px);
        }

        .input-field {
            width: 100%;
            max-width: 320px;
            padding: 14px;
            border-radius: 30px;
            border: 2px solid var(--accent-pink);
            text-align: center;
            margin-bottom: 25px;
            outline: none;
            font-size: 1.1rem;
            font-family: 'Cairo', sans-serif;
            transition: border-color 0.3s;
        }

        .heart {
            color: var(--accent-pink) !important;
            display: inline-block;
            opacity: 0;
            -webkit-print-color-adjust: exact;
        }

        .visible-heart {
            animation: beat 1.5s infinite;
            opacity: 1;
        }

        @keyframes beat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.3); } }

        @media print {
            .no-print { display: none !important; }
            body { background: white !important; }
            #message-page { display: flex !important; opacity: 1 !important; }
            #cover-page { display: none !important; }
            .vintage-card { 
                border: 2px solid var(--accent-pink); 
                box-shadow: none; 
                margin-top: 0;
                border-radius: 0;
                background-color: white !important;
            }
            .wax-seal { 
                opacity: 1 !important; 
                background-color: #d68080 !important;
            }
            .title-box { background-color: #e58e8e !important; color: white !important; }
            .replacement-word { color: #e58e8e !important; }
        }
    </style>
</head>
<body>

    <!-- صفحة الغلاف (الواجهة) -->
    <div id="cover-page">
        <div class="cover-content">
            <!-- صورة الجدة متفائلة بصيغة png -->
            <img src="Gemini_Generated_Image_1foohc1foohc1foo.png" alt="الجدة متفائلة" class="grandma-img">
            
            <h1 class="font-['Aref_Ruqaa'] text-3xl mb-4 text-[#4e342e] leading-relaxed">
                الجدة متفائلة تحييك على شجاعتك ووصولك إلى ختام الرحلة
            </h1>
            <p class="mb-8 text-xl text-[#5d4037] font-['Cairo']">رسالة دافئة بانتظارك في عالمنا المليء بالأمل...</p>
            
            <input type="text" id="recipient-name" placeholder="ما اسم الحفيد/ة الغالي/ة؟" class="input-field">
            <br>
            <button onclick="openLetter()" class="btn-action">
                فتح الرسالة
            </button>
        </div>
    </div>

    <!-- صفحة الرسالة -->
    <div id="message-page">
        <div class="vintage-card text-center">
            <div id="date-display" class="date-time no-print"></div>

            <div class="title-box no-print">
                <h2 class="text-3xl">رسالة من قلب الجدة متفائلة</h2>
            </div>

            <div id="message-body">
                <div id="display-recipient" class="text-2xl mb-10 text-right text-gray-700 font-['Aref_Ruqaa']"></div>
                
                <div id="typewriter" class="typewriter-text"></div>

                <!-- الختم المحسن بلون ثابت للطباعة -->
                <div id="wax-seal" class="wax-seal"></div>

                <div class="mt-24 no-print flex justify-center gap-6 opacity-0 transition-opacity duration-1000" id="signature-area">
                    <button onclick="window.print()" class="btn-action text-sm px-10">حفظ كذكرى جميلة</button>
                    <button onclick="location.reload()" class="bg-gray-100 text-gray-600 px-8 py-3 rounded-full text-sm font-bold border border-gray-200">رجوع</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function updateDateTime() {
            const now = new Date();
            const options = { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            };
            document.getElementById('date-display').innerText = now.toLocaleDateString('ar-SA', options);
        }
        updateDateTime();

        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function playSound(freq, duration, vol) {
            if (!audioCtx) audioCtx = new AudioContext();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        const messageText = "من القلب إلى أطفال العالم: عشتم آمنين أصحاء سعداء متفائلين";
        
        function openLetter() {
            const name = document.getElementById('recipient-name').value.trim();
            if (!name) return;

            const cover = document.getElementById('cover-page');
            const messagePage = document.getElementById('message-page');
            
            cover.style.transform = "translateY(-100%)";
            
            setTimeout(() => {
                cover.style.display = "none";
                messagePage.style.display = "flex";
                setTimeout(() => {
                    messagePage.style.opacity = "1";
                    // مراعاة التذكير والتأنيث
                    document.getElementById('display-recipient').innerText = `إلى حفيدنا الغالي / حفيدتنا الغالية: ${name}`;
                    typeWriterEffect();
                }, 100);
            }, 1000);
        }

        async function typeWriterEffect() {
            const el = document.getElementById('typewriter');
            el.innerHTML = "";
            
            for (let char of messageText) {
                el.innerHTML += char;
                playSound(180, 0.05, 0.02);
                await new Promise(r => setTimeout(r, 90));
            }

            el.innerHTML += ' <span class="heart" id="main-heart">❤️</span>';
            setTimeout(() => {
                const heart = document.getElementById('main-heart');
                if(heart) heart.classList.add('visible-heart');
                playSound(800, 0.4, 0.04);
            }, 400);

            setTimeout(() => {
                el.innerHTML = el.innerHTML.replace("أطفال", 
                    `<span class="strike-through">أطفال</span> <span class="replacement-word" id="hero-word">أبطال</span>`);
                
                setTimeout(() => {
                    const hero = document.getElementById('hero-word');
                    const seal = document.getElementById('wax-seal');
                    if(hero) hero.classList.add('visible');
                    if(seal) seal.style.opacity = "1";
                    document.getElementById('signature-area').classList.remove('opacity-0');
                    playSound(440, 0.6, 0.03);
                }, 400);
            }, 2000);
        }
    </script>
</body>
</html>
